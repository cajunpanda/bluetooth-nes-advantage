; Build configuration for PlatformIO. Same ESP-IDF source tree as `idf.py`.
; `src_dir = main` lets PlatformIO use the canonical ESP-IDF `main/` component layout.
[platformio]
src_dir = main

; Default env: dual-mode Classic Pro / BLE gameplay firmware.
; Flash with benchmux: serial_proxy.py flash --flash-cmd 'pio run -e wroom32 -t upload'
; The pre-build patch makes the Bluedroid Classic HID device act like a Pro Controller at the link
; layer (a slave that never initiates sniff), required for stable 8BitDo and Switch connections.
; It is a no-op for the BLE transport, so it is safe to apply to the dual-mode build.
[env:wroom32]
platform = espressif32
board = esp32dev            ; generic ESP32-WROOM-32 DevKit
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
extra_scripts =
    pre:../tools/patch_bluedroid_sniff.py
    pre:../tools/patch_bluedroid_hid_intr.py
; upload/monitor ports are auto-detected (and the proxy owns the monitor); leaving them
; unset survives ttyUSBn renumbering on replug.
